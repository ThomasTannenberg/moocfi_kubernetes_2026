---
# ============================================================================
# k3s + HAProxy von allen Nodes entfernen
# Lässt die VMs selbst unangetastet — nutze /99-cleanup.sh aus dem
# VM-Setup, wenn du auch die VMs wegwerfen willst.
# ============================================================================

- name: k3s-Agents deinstallieren
  hosts: k3s_agents
  become: yes
  gather_facts: no
  tasks:
    - name: k3s-agent-uninstall.sh ausführen (falls vorhanden)
      command: /usr/local/bin/k3s-agent-uninstall.sh
      args:
        removes: /usr/local/bin/k3s-agent-uninstall.sh

- name: k3s-Server deinstallieren
  hosts: k3s_servers:k3s_init
  become: yes
  gather_facts: no
  tasks:
    - name: k3s-uninstall.sh ausführen (falls vorhanden)
      command: /usr/local/bin/k3s-uninstall.sh
      args:
        removes: /usr/local/bin/k3s-uninstall.sh

- name: HAProxy entfernen
  hosts: k3s_lb
  become: yes
  gather_facts: no
  tasks:
    - name: HAProxy stoppen
      systemd:
        name: haproxy
        state: stopped
      ignore_errors: yes

    - name: HAProxy-Paket purgen
      apt:
        name: haproxy
        state: absent
        purge: yes

- name: Lokale kubeconfig entfernen
  hosts: localhost
  gather_facts: no
  tasks:
    - name: k3s.yaml löschen
      file:
        path: "{{ playbook_dir }}/k3s.yaml"
        state: absent
