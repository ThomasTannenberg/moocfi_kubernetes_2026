# Inventar für das k3s-Cluster
#
# Falls dein VM-User nicht 'tom' heisst (z.B. 'k3sadmin'), passe
# ansible_user unten an oder überschreibe per CLI:
#   ansible-playbook -e ansible_user=k3sadmin site.yml

[k3s_lb]
k3s-lb-1        ansible_host=192.168.122.10

# 'k3s_init' = der Bootstrap-Server (--cluster-init). Genau EIN Host.
[k3s_init]
k3s-server-1    ansible_host=192.168.122.11

# Weitere Server-Nodes, die dem Cluster beitreten (--server <LB>).
[k3s_servers]
k3s-server-2    ansible_host=192.168.122.12
k3s-server-3    ansible_host=192.168.122.13

# Worker-Nodes
[k3s_agents]
k3s-agent-1     ansible_host=192.168.122.21
k3s-agent-2     ansible_host=192.168.122.22
k3s-agent-3     ansible_host=192.168.122.23

# Komfortgruppe: alle k3s-Nodes (Init + zusätzliche Server + Agents)
[k3s_cluster:children]
k3s_init
k3s_servers
k3s_agents

[all:vars]
ansible_user=k3sadmin
ansible_ssh_private_key_file=~/.ssh/id_ed25519
